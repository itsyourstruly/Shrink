name: Build, Sign, and Deploy Update

on:
  push:
    tags:
      - 'v*' # Triggers when you push a semantic version tag (e.g., v1.0.0)

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      pages: write      # Required to bundle the artifact for Pages
      id-token: write   # Required for secure OIDC deployment authentication

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build macOS App
        run: |
          xcodebuild -project "Shrink/Shrink.xcodeproj" \
                     -scheme "Shrink" \
                     -configuration Release \
                     -derivedDataPath Build/ \
                     CODE_SIGN_IDENTITY="-" \
                     CODE_SIGN_STYLE="Manual" \
                     CODE_SIGNING_ALLOWED=NO \
                     clean build

      - name: Install create-dmg utility
        run: brew install create-dmg

      - name: Prepare Packaging Directory
        run: |
          mkdir -p dist/dmg-root
          APP_PATH=$(find Build -name "Shrink.app" -type d -maxdepth 4 | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Shrink.app could not be found in the build directory."
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" dist/dmg-root/

      - name: Unify Code Signatures
        run: |
          codesign --force --deep -s - dist/dmg-root/Shrink.app

      - name: Package App into DMG
        run: |
          create-dmg \
            --volname "Shrink" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Shrink.app" 175 190 \
            --hide-extension "Shrink.app" \
            --app-drop-link 425 190 \
            "dist/Shrink-${{ github.ref_name }}.dmg" \
            "dist/dmg-root/"

      - name: Download Sparkle Tools for Appcast Generation
        run: |
          curl -L -o sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz
          mkdir sparkle-cli
          tar -xf sparkle.tar.xz -C sparkle-cli

      - name: Create GitHub Release and Upload DMG
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          name: "Shrink ${{ github.ref_name }}"
          body: "Automated distribution release for version ${{ github.ref_name }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Appcast XML (No Git Commit)
        run: |
          mkdir -p deploy
          
          # 1. Safely pull down your live public appcast file if it exists
          curl -s -f "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/appcast.xml" -o deploy/appcast.xml || echo "No existing live appcast found. Generating fresh file."
          
          # 2. Copy the fresh DMG into the folder so Sparkle can extract its file size and metadata
          cp dist/*.dmg deploy/
          
          # 3. Securely sign the entry and append/generate the new XML
          echo "${{ secrets.SPARKLE_PRIVATE_KEY }}" | ./sparkle-cli/bin/generate_appcast --ed-key-file - deploy/
          
          # 4. Clean out the local DMG binary so we only publish the lightweight text file to Pages
          rm deploy/*.dmg

      - name: Upload Artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/

  deploy-pages:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
